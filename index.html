<title>Toque Smart Entregas</title>
<style>
:root{
  --navy:#102638;--navy2:#0b1e2d;--blue:#4ca3d8;--blue2:#2f6ea3;
  --slate:#58748c;--ink:#1c2d3a;--muted:#6b7d8c;--line:#d7e1e8;
  --card:rgba(255,255,255,.88);--soft:#f4f7f9;--danger:#b23d3d;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#edf2f5 0%,#f7f9fb 100%);color:var(--ink)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.appbar{
  position:sticky;top:0;z-index:50;padding:14px 18px;
  background:rgba(16,38,56,.95);backdrop-filter:blur(18px) saturate(1.2);
  color:#fff;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(8,24,36,.2)
}
.brand{display:flex;align-items:center;gap:12px}
.brand img{height:30px;width:auto;display:block}
.brand-copy strong{display:block;font-size:17px}
.brand-copy small{display:block;opacity:.7;font-size:11px;margin-top:2px}
.actions{display:flex;gap:8px;align-items:center}
.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;transition:.18s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--blue);color:#fff}
.btn.secondary{background:rgba(255,255,255,.11);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn.soft{background:#eaf3f9;color:#245c82}
.btn.danger{background:#faecec;color:var(--danger)}
.shell{max-width:1180px;margin:22px auto;padding:0 16px 38px}
.layout{display:grid;grid-template-columns:310px minmax(0,1fr);gap:18px}
.card{background:var(--card);backdrop-filter:blur(14px);border:1px solid rgba(196,210,220,.85);border-radius:20px;box-shadow:0 10px 34px rgba(28,55,74,.08)}
.sidebar{padding:16px;align-self:start;position:sticky;top:86px}
.section-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:3px 2px 10px}
.steps{display:grid;gap:8px}
.step{
  display:grid;grid-template-columns:34px 1fr 18px;gap:10px;align-items:center;
  border:0;background:transparent;text-align:left;padding:10px;border-radius:13px;color:var(--ink)
}
.step.active{background:linear-gradient(90deg,#e8f4fb,#f4f9fc);color:#1e638e;font-weight:800}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#edf2f5;font-size:12px;font-weight:800}
.step.active .step-num{background:var(--blue);color:#fff}
.step-check{color:#87a0b3;font-size:12px}
.meta-card{margin-top:14px;background:#f7f9fb;border-radius:13px;padding:12px;font-size:12px;line-height:1.55;color:var(--muted)}
.drafts-header{display:flex;align-items:center;justify-content:space-between;margin-top:18px}
.drafts-list{display:grid;gap:9px;margin-top:9px}
.draft{
  display:grid;grid-template-columns:1fr 36px;gap:8px;align-items:center;
  border:1px solid var(--line);border-radius:13px;padding:10px 10px 10px 12px;background:#fbfcfd
}
.draft-main{border:0;background:transparent;text-align:left;padding:0}
.draft-main b{display:block;color:#246c9d;font-size:14px}
.draft-main small{display:block;color:var(--muted);margin-top:3px}
.delete-draft{border:0;background:#fff0f0;color:var(--danger);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.delete-draft svg{width:17px;height:17px;stroke:currentColor;fill:none}
.panel{padding:24px}
.panel h1{font-size:28px;margin:0 0 6px;letter-spacing:-.02em;color:var(--navy)}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:22px}
.grid{display:grid;gap:14px}
.grid.two{grid-template-columns:1fr 1fr}
.field{display:grid;gap:7px}
.field label{font-size:12px;color:#355267;font-weight:800}
.field input,.field textarea,.field select{
  width:100%;border:1px solid #c8d5df;border-radius:12px;padding:12px 13px;background:#fff;color:var(--ink);outline:none
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(76,163,216,.12)}
.field textarea{min-height:110px;resize:vertical}
.photo-box{margin-top:14px;border:1.5px dashed #b7c6d2;border-radius:16px;background:#fbfcfd;padding:14px}
.photo-box img{width:100%;height:230px;object-fit:cover;border-radius:14px;background:linear-gradient(135deg,#e8edf1,#dfe7ec);display:block;margin-bottom:10px;box-shadow:inset 0 0 0 1px rgba(180,197,208,.55)}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}
table{width:100%;border-collapse:collapse;min-width:760px}
th{background:var(--navy);color:white;padding:11px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
td{border-top:1px solid var(--line);padding:10px 8px;font-size:13px}
td.center{text-align:center}
input[type=checkbox],input[type=radio]{width:18px;height:18px;accent-color:var(--blue2)}
.check-list{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid #dce5eb;border-radius:12px;background:#fbfcfd}
.block{border-top:1px solid var(--line);margin-top:18px;padding-top:18px}
.block h2{margin:0 0 9px;color:var(--navy);font-size:18px}
.notice{padding:14px;border-radius:13px;background:#fff7df;color:#6f5610;border:1px solid #ecd891;font-size:12px;line-height:1.5}
.signature-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sig-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px}
.sig-card canvas{width:100%;height:190px;border:1px dashed #aebdca;border-radius:10px;touch-action:none;background:#fff}
.sig-tools{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px;color:var(--muted)}
.bottom-actions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:22px}
.modal{position:fixed;inset:0;background:rgba(6,18,28,.72);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow:auto}
.modal-card{width:min(100%,980px);background:#e9eef2;border-radius:16px;padding:12px}
.modal-top{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:5px 4px 12px}
iframe{width:100%;height:calc(100vh - 92px);border:0;border-radius:12px;background:#fff}
.empty{font-size:12px;color:var(--muted);padding:8px 4px}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .steps{grid-template-columns:repeat(3,1fr)}
  .step{grid-template-columns:30px 1fr;padding:9px}
  .step-check{display:none}
}
@media(max-width:640px){
  .brand-copy small{display:none}
  .appbar{align-items:flex-start;gap:10px}
  .actions .btn{padding:9px 10px;font-size:12px}
  .panel{padding:17px}
  .grid.two,.signature-grid,.check-list{grid-template-columns:1fr}
  .steps{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

function initSig(key){
  const c=document.getElementById('sig-'+key),ctx=c.getContext('2d');ctx.lineWidth=4;ctx.lineCap='round';ctx.strokeStyle='#102638';

  const pt=e=>{const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*c.width/r.width,y:(t.clientY-r.top)*c.height/r.height}};

  const move=e=>{if(!down)return;e.preventDefault();const p=pt(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p};

}

  <section class="page"><div class="header"><img src="${LOGO_DARK}"><div class="meta">Acta de entrega <span class="pageno">4</span></div></div><h1>Garantías y condiciones</h1><div class="line"></div><div class="terms"><div class="term"><div class="term-icon">01</div><div><h2>Garantía de equipos</h2><p>Los equipos suministrados e instalados por Toque Smart cuentan con garantía de un (1) año por defectos de fabricación y fallas de funcionamiento bajo condiciones normales de uso. La garantía es ofrecida directamente por cada fabricante, conforme a sus políticas, procedimientos, limitaciones y aprobación. Toque Smart apoyará la gestión cuando corresponda.</p></div></div><div class="term"><div class="term-icon">90</div><div><h2>Garantía de instalación y programación</h2><p>Toque Smart ofrece una garantía de noventa (90) días calendario sobre la mano de obra, instalación, configuración y programación realizadas dentro del alcance contratado. Cualquier modificación posterior realizada por terceros podrá invalidar esta cobertura.</p></div></div><div class="term"><div class="term-icon">03</div><div><h2>Exclusiones</h2><p>La garantía no cubre daños físicos, golpes, caídas, mal uso, negligencia, intervenciones de terceros no autorizados, fluctuaciones eléctricas, rayos, fuego, humedad, filtraciones, inundaciones, fenómenos naturales, fallas del proveedor de internet, cambios de software o plataformas de terceros, suscripciones, licencias, cableado preexistente, falta de mantenimiento preventivo ni equipos entregados como obsequio o sin factura.</p></div></div><div class="term"><div class="term-icon">04</div><div><h2>Modificaciones posteriores</h2><p>Cualquier modificación, ampliación, ajuste de programación o cambio solicitado después de la aceptación formal del proyecto estará sujeto a evaluación y podrá generar cargos adicionales conforme a las tarifas vigentes de Toque Smart.</p></div></div></div><div class="support"><h1>Soporte y servicio</h1><div class="line"></div><p>Para solicitudes de servicio, soporte o mantenimiento, utilice los canales oficiales:</p><div class="support-grid"><div class="support-card"><b>WhatsApp</b><span>${SUPPORT_PHONE}</span></div><div class="support-card"><b>Correo</b><span>${SUPPORT_EMAIL}</span></div><div class="support-card"><b>Horario de atención</b><span>Lunes a viernes · 9:00am–6:00pm</span></div></div></div><div class="footer"><span><span class="dot"></span>Tecnología integrada a tu vida.</span><span>toquesmart.com</span></div></section>
  <section class="page"><div class="header"><img src="${LOGO_DARK}"><div class="meta">Acta de entrega <span class="pageno">5</span></div></div><h1>Aceptación del proyecto</h1><div class="line"></div><p>Con la firma del presente documento, el cliente confirma haber recibido el proyecto descrito, haber validado el correcto funcionamiento de los sistemas y aceptar la entrega en las condiciones aquí indicadas.</p><table class="sign-table"><tr><th>Toque Smart</th><th>Cliente</th></tr><tr><td><span class="field">Nombre:</span><span class="fieldline">${esc(state.project.representative)}</span><span class="field">Cargo:</span><span class="fieldline"></span><span class="field">Fecha:</span><span class="fieldline">${esc(date)}</span></td><td><span class="field">Nombre:</span><span class="fieldline">${esc(state.project.clientName)}</span><span class="field">Cédula:</span><span class="fieldline">${esc(state.signatures.clientId)}</span><span class="field">Correo:</span><span class="fieldline">${esc(state.project.clientEmail)}</span></td></tr></table><div class="signatures"><div class="sig"><h2>Firma Toque Smart</h2><img src="${state.signatures.representative||''}"></div><div class="sig"><h2>Firma del cliente</h2><img src="${state.signatures.client||''}"></div></div><div style="margin-top:23px"><h2>Plan de servicio</h2><div class="plan-grid"><div class="plan"><div>♡</div><div><b>Toque Smart Care</b><p>Plan de servicio y mantenimiento contratado.</p></div><div class="check">${planCare}</div></div><div class="plan"><div>⊘</div><div><b>Sin plan activo</b><p>Servicios sujetos a evaluación y tarifas vigentes.</p></div><div class="check">${planNone}</div></div></div></div><div class="footer"><span><span class="dot"></span>Tecnología integrada a tu vida.</span><span>toquesmart.com</span></div></section>
  </body></html>`;
}
function showPreview(){persist();save();frame.srcdoc=documentHTML();modal.classList.remove('hidden')}
function newProject(){persist();save();if(!confirm('¿Crear un proyecto nuevo? El actual quedará guardado.'))return;state=fresh();localStorage.setItem('ts_current',JSON.stringify(state));currentStep=0;render();renderDrafts()}
newBtn.onclick=newProject;
saveBtn.onclick=()=>{persist();save()};
previewBtn.onclick=showPreview;
closeBtn.onclick=()=>modal.classList.add('hidden');
printBtn.onclick=()=>frame.contentWindow.print();
shareBtn.onclick=async()=>{const f=new File([documentHTML()],`Acta_${(state.project.name||'Proyecto').replace(/\s+/g,'_')}.html`,{type:'text/html'});if(navigator.canShare&&navigator.canShare({files:[f]}))await navigator.share({title:'Acta de Entrega',files:[f]});else{const a=document.createElement('a');a.href=URL.createObjectURL(f);a.download=f.name;a.click()}};
render();renderDrafts();
</script>
