*{box-sizing:border-box}html,body{margin:0;background:#edf2f5;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input,textarea,select{font:inherit}.hidden{display:none!important}
.appbar{position:sticky;top:0;z-index:30;background:rgba(16,38,56,.97);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 18px rgba(0,0,0,.18)}.brand{display:flex;gap:12px;align-items:center}.brand img{height:30px}.brand small{display:block;opacity:.72;font-size:11px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.btn.primary{background:var(--blue);color:#fff}.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.28)}.btn.soft{background:#e8f1f7;color:var(--navy)}.btn.dark{background:var(--navy);color:#fff}
.shell{max-width:1160px;margin:22px auto;padding:0 16px 40px}.layout{display:grid;grid-template-columns:270px 1fr;gap:18px}.sidebar,.panel{background:#fff;border:1px solid #dbe4eb;border-radius:16px;box-shadow:0 6px 24px rgba(18,42,60,.07)}.sidebar{padding:16px;height:fit-content;position:sticky;top:86px}.panel{padding:22px}.panel h1{margin:0 0 6px;color:var(--navy);font-size:25px}.panel h2{font-size:18px;color:var(--navy)}.sub{color:var(--muted);font-size:13px;margin-bottom:18px}.navtitle{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:4px 0 10px}.steps{display:grid;gap:7px}.step{border:0;background:transparent;border-radius:11px;padding:11px 12px;text-align:left;display:flex;align-items:center;gap:10px;color:var(--text)}.step.active{background:#e9f3fa;color:#1f628f;font-weight:700}.num{width:26px;height:26px;border-radius:50%;background:#edf2f5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}.step.active .num{background:var(--blue);color:#fff}.sidecard{margin-top:16px;padding:12px;border-radius:12px;background:#f7f9fb;font-size:12px;line-height:1.45;color:var(--muted)}
.grid{display:grid;gap:14px}.grid.two{grid-template-columns:1fr 1fr}.field{display:grid;gap:7px}.field label{font-size:12px;color:#355267;font-weight:700}.field input,.field textarea,.field select{width:100%;border:1px solid #c9d6e0;border-radius:10px;padding:11px 12px;background:#fff;color:var(--text)}.field textarea{min-height:105px;resize:vertical}.photo{border:1.5px dashed #b7c6d2;border-radius:14px;padding:14px;background:#fbfcfd}.photo img{width:100%;height:210px;object-fit:cover;border-radius:10px;background:#e7ecef;margin:8px 0}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:760px}th{background:var(--navy);color:#fff;font-size:11px;padding:11px 8px;text-transform:uppercase}td{border-top:1px solid var(--line);padding:9px 8px;font-size:13px}td.center{text-align:center}input[type=checkbox],input[type=radio]{width:18px;height:18px;accent-color:var(--blue2)}.checks{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}.check{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid #dce5eb;border-radius:10px;background:#fbfcfd}.status{border-top:1px solid var(--line);padding-top:18px;margin-top:18px}.notice{padding:12px 14px;border-radius:11px;background:#fff7df;color:#6f5610;border:1px solid #ecd891;font-size:12px;line-height:1.5}.signaturegrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.sigbox{border:1px solid #cbd8e2;border-radius:12px;padding:12px}.sigbox canvas{width:100%;height:180px;border:1px dashed #aebdca;border-radius:9px;touch-action:none;background:#fff}.sigactions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}.footactions{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:22px}
.modal{position:fixed;inset:0;z-index:100;background:rgba(7,18,27,.72);display:flex;align-items:flex-start;justify-content:center;padding:18px;overflow:auto}.modalcard{background:#e9eef2;border-radius:16px;max-width:980px;width:100%;padding:12px}.modalbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 4px 12px}.frame{width:100%;height:calc(100vh - 100px);border:0;border-radius:10px;background:#fff}.recent{display:grid;gap:8px}.recent button{border:1px solid var(--line);background:#fbfcfd;border-radius:10px;padding:10px;text-align:left}.recent b{display:block}.recent small{color:var(--muted)}
@media(max-width:850px){.layout{grid-template-columns:1fr}.sidebar{position:static}.steps{grid-template-columns:repeat(3,1fr)}.step span:last-child{display:none}.grid.two,.signaturegrid,.checks{grid-template-columns:1fr}}@media(max-width:560px){.brand small{display:none}.panel{padding:16px}.btn{padding:8px 10px;font-size:12px}}

function esc(v){return String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function loadCurrent(){try{return JSON.parse(localStorage.getItem('ts_current')||'null')}catch{return null}}
function save(){state.updatedAt=new Date().toISOString();localStorage.setItem('ts_current',JSON.stringify(state));let all=JSON.parse(localStorage.getItem('ts_projects')||'{}');all[state.id]=state;localStorage.setItem('ts_projects',JSON.stringify(all));document.getElementById('saved').textContent=new Date(state.updatedAt).toLocaleString();renderRecent()}
function renderNav(){document.getElementById('steps').innerHTML=STEPS.map((x,i)=>`<button class="step ${i===step?'active':''}" data-i="${i}"><span class="num">${i+1}</span><span>${x}</span></button>`).join('');document.querySelectorAll('.step').forEach(b=>b.onclick=()=>{persist();step=+b.dataset.i;render()})}
function render(){renderNav();document.getElementById('status').textContent=state.status==='finalized'?'Finalizado':'Borrador';document.getElementById('panel').innerHTML=markup(step);bind(step);if(step===5){let a=document.createElement('div');a.className='footactions';a.innerHTML='<span></span><button class="btn primary" id="finalBtn">Aceptar y finalizar</button>';document.getElementById('panel').appendChild(a);document.getElementById('finalBtn').onclick=finalize}}
function field(label,id,val,type='text'){return`<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(val)}"></div>`}

if(i===1)return`<h1>Sistemas instalados</h1><div class="sub">Selecciona una condición por sistema.</div><div class="tablewrap"><table><thead><tr><th>Sistema</th><th>Toque Smart</th><th>Cliente</th><th>Tercero</th><th>No presente</th></tr></thead><tbody>${SYSTEMS.map((s,n)=>`<tr><td>${s}${s==='Otro'?` <input id="other" placeholder="Especificar" value="${esc(state.otherSystem||'')}" style="border:0;border-bottom:1px solid #bcc8d2">`:''}</td>${['toque','client','third','none'].map(v=>`<td class="center"><input type="radio" name="sys${n}" value="${v}" ${state.systems[s]===v?'checked':''}></td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
if(i===2)return`<h1>Verificación y recorrido</h1><div class="sub">Marca los puntos junto al cliente.</div><div class="checks">${CHECKS.map((x,n)=>`<label class="check"><input data-check="${n}" type="checkbox" ${state.verification[x]?'checked':''}><span>${x}</span></label>`).join('')}</div>`;
if(i===3)return`<h1>Estado de entrega</h1><div class="sub">Documenta pendientes y futuras etapas.</div><div class="status"><h2>Pendientes menores</h2><div class="field"><textarea id="minor">${esc(state.statusInfo.minor)}</textarea></div><label class="check"><input id="minorNone" type="checkbox" ${state.statusInfo.minorNone?'checked':''}><span>No existen pendientes menores.</span></label></div><div class="status"><h2>Fase II o trabajos futuros</h2><div class="field"><textarea id="phase2">${esc(state.statusInfo.phase2)}</textarea></div><label class="check"><input id="phase2None" type="checkbox" ${state.statusInfo.phase2None?'checked':''}><span>No existen trabajos futuros documentados.</span></label></div><div class="status"><h2>Observaciones generales</h2><div class="field"><textarea id="notes">${esc(state.statusInfo.notes)}</textarea></div></div>`;
if(i===4)return`<h1>Términos y condiciones</h1><div class="sub">Revísalos con el cliente antes de firmar.</div><div class="notice"><b>Garantía de equipos:</b> un año directamente con el fabricante.<br><br><b>Garantía de instalación y programación:</b> noventa días sobre la ejecución realizada por Toque Smart.<br><br><b>Exclusiones:</b> daños físicos, terceros no autorizados, fluctuaciones eléctricas, fuego, humedad, filtraciones, fenómenos naturales, fallas de internet, licencias y servicios de terceros.<br><br><b>Modificaciones posteriores:</b> pueden generar cargos conforme a las tarifas vigentes.</div><label class="check" style="margin-top:16px"><input id="terms" type="checkbox" ${state.termsAccepted?'checked':''}><span>El cliente confirma haber revisado y comprendido los términos.</span></label><h2>Plan de servicio</h2><div class="grid two"><label class="check"><input type="radio" name="plan" value="care" ${state.servicePlan==='care'?'checked':''}><span><b>Toque Smart Care</b><br><small>Plan activo.</small></span></label><label class="check"><input type="radio" name="plan" value="none" ${state.servicePlan==='none'?'checked':''}><span><b>Sin plan activo</b><br><small>Servicios sujetos a tarifas vigentes.</small></span></label></div>`;
return`<h1>Firmas y finalización</h1><div class="sub">Confirma el correo del cliente y recoge ambas firmas.</div><div class="grid two">${field('Correo del cliente','finalEmail',state.project.clientEmail,'email')}${field('Cédula del cliente','clientId',state.signatures.clientId)}</div><div class="signaturegrid" style="margin-top:16px">${sig('representative','Firma representante Toque Smart')}${sig('client','Firma del cliente')}</div><div class="notice" style="margin-top:16px">Esta primera versión guarda localmente, genera la vista final, permite imprimir como PDF y compartir. El envío automático con PDF adjunto requiere conectar un backend seguro.</div>`}

function preview(){persist();save();frame.srcdoc=docHTML();modal.classList.remove('hidden')}
function finalize(){persist();save();let m=validate();if(m.length)return alert('Falta: '+m.join(', '));if(!confirm('¿Finalizar y bloquear?'))return;state.status='finalized';save();render();preview();let sub=encodeURIComponent('Acta de entrega - '+state.project.name),body=encodeURIComponent('Hola '+state.project.clientName+',\n\nAdjuntamos el acta de entrega.\n\nToque Smart');window.open(`mailto:${encodeURIComponent(state.project.clientEmail)}?cc=${encodeURIComponent(SUPPORT_EMAIL)}&subject=${sub}&body=${body}`)}
function share(){let f=new File([docHTML()],`Acta_${(state.project.name||'Proyecto').replace(/\s+/g,'_')}.html`,{type:'text/html'});if(navigator.canShare&&navigator.canShare({files:[f]}))navigator.share({title:'Acta de Entrega',files:[f]});else{let a=document.createElement('a');a.href=URL.createObjectURL(f);a.download=f.name;a.click()}}
function renderRecent(){let all=Object.values(JSON.parse(localStorage.getItem('ts_projects')||'{}')).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')).slice(0,5);recent.innerHTML=all.length?all.map(p=>`<button data-id="${p.id}"><b>${esc(p.project.name||'Sin nombre')}</b><small>${esc(p.project.clientName||'Sin cliente')} · ${p.status==='finalized'?'Finalizado':'Borrador'}</small></button>`).join(''):'<small>Sin borradores.</small>';document.querySelectorAll('#recent button').forEach(b=>b.onclick=()=>{let a=JSON.parse(localStorage.getItem('ts_projects')||'{}');state=a[b.dataset.id];localStorage.setItem('ts_current',JSON.stringify(state));step=0;render()})}
newBtn.onclick=()=>{if(confirm('¿Crear proyecto nuevo?')){persist();save();state=fresh();localStorage.setItem('ts_current',JSON.stringify(state));step=0;render()}};saveBtn.onclick=()=>{persist();save()};previewBtn.onclick=preview;closeBtn.onclick=()=>modal.classList.add('hidden');printBtn.onclick=()=>frame.contentWindow.print();shareBtn.onclick=share;if('serviceWorker'in navigator&&location.protocol.startsWith('http'))navigator.serviceWorker.register('./sw.js');render();renderRecent();
</script></body></html>
